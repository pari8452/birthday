<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Protected</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 28px;
            animation: slideIn 1s ease-out 0.3s both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .lock-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        input[type="password"], input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="password"]:focus, input[type="text"]:focus {
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        button {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.4);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(233, 69, 96, 0);
            }
        }

        button:hover {
            transform: scale(1.05);
        }

        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error {
            background: rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
            border: 1px solid rgba(255, 0, 0, 0.3);
        }

        .success {
            background: rgba(0, 255, 0, 0.3);
            color: #6bff6b;
            border: 1px solid rgba(0, 255, 0, 0.3);
        }

        .hidden-content {
            display: none;
        }

        .secret-content {
            color: #fff;
        }

        .secret-content h2 {
            margin-bottom: 20px;
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #e94560;
            }
            to {
                text-shadow: 0 0 20px #ff6b6b, 0 0 30px #e94560;
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .dot {
            width: 15px;
            height: 15px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: dotPulse 1.5s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        .dot:nth-child(4) { animation-delay: 0.6s; }
        .dot:nth-child(5) { animation-delay: 0.8s; }

        @keyframes dotPulse {
            0%, 100% {
                transform: scale(1);
                background: rgba(255, 255, 255, 0.3);
            }
            50% {
                transform: scale(1.3);
                background: #e94560;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container" id="loginContainer">
        <div class="lock-icon">🔒</div>
        <h1>Enter Passcode</h1>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <input type="password" id="password" placeholder="Enter passcode..." autocomplete="off">
        <br>
        <button onclick="checkPassword()">Unlock</button>
        <div id="message"></div>
    </div>

    <div class="container hidden-content" id="secretContent">
        <div class="secret-content">
            <h2>🎉 Welcome! 🎉</h2>
            <p>Access Granted!</p>
            <br>
            <p>Passcode: <strong>8072005</strong></p>
            <br>
            <button onclick="lockScreen()" style="margin-top: 20px;">🔒 Lock</button>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        createParticles();

        // Password check function
        function checkPassword() {
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');
            const secretContent = document.getElementById('secretContent');
            const loginContainer = document.getElementById('loginContainer');

            if (password === '8072005') {
                message.style.display = 'block';
                message.className = 'success';
                message.textContent = '✓ Access Granted!';
                
                setTimeout(() => {
                    loginContainer.style.display = 'none';
                    secretContent.style.display = 'block';
                    secretContent.style.animation = 'fadeIn 0.5s ease-out';
                }, 1000);
            } else {
                message.style.display = 'block';
                message.className = 'error';
                message.textContent = '✗ Incorrect Passcode!';
                
                // Shake animation
                const container = document.querySelector('.container');
                container.style.animation = 'shake 0.5s ease';
                setTimeout(() => {
                    container.style.animation = '';
                }, 500);
            }
        }

        // Lock screen function
        function lockScreen() {
            document.getElementById('secretContent').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('password').value = '';
            document.getElementById('message').style.display = 'none';
        }

        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
